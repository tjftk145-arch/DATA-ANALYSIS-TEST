<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>전국 해수욕장 이용객 현황 대시보드</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --blue: #1f6feb;
      --teal: #00856f;
      --amber: #b7791f;
      --rose: #c2415d;
      --shadow: 0 8px 22px rgba(19, 35, 58, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    header {
      background: #12355b;
      color: #fff;
      padding: 28px 22px;
      border-bottom: 5px solid var(--teal);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 800;
    }

    .year {
      margin: 0;
      color: #dceaf8;
      font-size: 15px;
    }

    main {
      padding: 24px 22px 36px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .card, .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .card {
      padding: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 27px;
      font-weight: 800;
      line-height: 1.15;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .section {
      padding: 18px;
      overflow: hidden;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 105px;
      gap: 10px;
      align-items: center;
      margin: 9px 0;
      font-size: 13px;
    }

    .track {
      height: 18px;
      background: #e8eef6;
      border-radius: 4px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      min-width: 2px;
      background: var(--blue);
    }

    .fill.teal {
      background: var(--teal);
    }

    .bar-value {
      text-align: right;
      color: var(--muted);
      white-space: nowrap;
    }

    .filters {
      display: grid;
      grid-template-columns: 190px 1fr 170px;
      gap: 10px;
      margin-bottom: 14px;
    }

    select, input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 9px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      background: #eef3f8;
      color: #26344d;
      cursor: pointer;
      user-select: none;
      z-index: 1;
    }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .table-box {
      max-height: 520px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #fff1d6;
      color: #7a4b00;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      h1 {
        font-size: 24px;
      }

      .summary, .grid, .filters {
        grid-template-columns: 1fr;
      }

      .bar-row {
        grid-template-columns: 82px 1fr 88px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>전국 해수욕장 이용객 현황 대시보드</h1>
      <p class="year">데이터 기준 연도: 2023년</p>
    </div>
  </header>

  <main class="wrap">
    <section class="summary" aria-label="요약 카드">
      <div class="card">
        <div class="label">전국 해수욕장 수</div>
        <div class="value" id="totalCount">-</div>
      </div>
      <div class="card">
        <div class="label">총 이용객 수</div>
        <div class="value" id="totalVisitors">-</div>
      </div>
      <div class="card">
        <div class="label">이용객 1위 시도</div>
        <div class="value" id="topProvince">-</div>
      </div>
      <div class="card">
        <div class="label">100만 명 이상 시군구</div>
        <div class="value" id="millionCities">-</div>
      </div>
    </section>

    <section class="grid" aria-label="시각화">
      <div class="section">
        <h2>시도별 이용객 수</h2>
        <div id="provinceChart"></div>
      </div>
      <div class="section">
        <h2>상위 10개 해수욕장</h2>
        <div id="topBeachChart"></div>
      </div>
    </section>

    <section class="section">
      <h2>전국 해수욕장 데이터</h2>
      <div class="filters">
        <select id="provinceFilter" aria-label="시도 필터">
          <option value="">전체 시도</option>
        </select>
        <input id="searchInput" type="search" placeholder="해수욕장명 검색" aria-label="해수욕장명 검색">
        <input id="minVisitors" type="number" min="0" step="10000" placeholder="최소 이용객 수" aria-label="최소 이용객 수">
      </div>
      <div class="table-box">
        <table>
          <thead>
            <tr>
              <th data-key="province">시도</th>
              <th data-key="city">시군구</th>
              <th data-key="beach">해수욕장명</th>
              <th data-key="visitors">2023년 이용객 수</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <p class="note" id="rowCount"></p>
    </section>
  </main>

  <script>
    const numberFormat = new Intl.NumberFormat("ko-KR");
    const state = {
      sortKey: "visitors",
      sortDirection: "desc"
    };

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      const headers = lines.shift().split(",").map((header) => header.trim());
      return lines.map((line) => {
        const cells = line.split(",").map((cell) => cell.trim());
        const row = Object.fromEntries(headers.map((header, index) => [header, cells[index] || ""]));
        return {
          province: row["시도"],
          city: row["시군구"],
          beach: row["해수욕장명"],
          visitors: Number(row["2023년"])
        };
      });
    }

    function groupSum(rows, key) {
      return rows.reduce((map, row) => {
        const label = row[key];
        if (!map.has(label)) {
          map.set(label, { label, visitors: 0, count: 0 });
        }
        const item = map.get(label);
        item.visitors += row.visitors;
        item.count += 1;
        return map;
      }, new Map());
    }

    function renderSummary(rows) {
      const provinceTotals = [...groupSum(rows, "province").values()].sort((a, b) => b.visitors - a.visitors);
      const cityTotals = [...groupSum(rows, "city").values()];
      const totalVisitors = rows.reduce((sum, row) => sum + row.visitors, 0);
      document.getElementById("totalCount").textContent = `${numberFormat.format(rows.length)}개소`;
      document.getElementById("totalVisitors").textContent = `${numberFormat.format(totalVisitors)}명`;
      document.getElementById("topProvince").textContent = provinceTotals[0].label;
      document.getElementById("millionCities").textContent = `${cityTotals.filter((item) => item.visitors >= 1000000).length}개`;
    }

    function renderBars(targetId, items, colorClass = "") {
      const target = document.getElementById(targetId);
      const max = Math.max(...items.map((item) => item.visitors));
      target.innerHTML = items.map((item) => {
        const width = max ? (item.visitors / max) * 100 : 0;
        return `
          <div class="bar-row">
            <div title="${item.label}">${item.label}</div>
            <div class="track"><div class="fill ${colorClass}" style="width:${width}%"></div></div>
            <div class="bar-value">${numberFormat.format(item.visitors)}명</div>
          </div>
        `;
      }).join("");
    }

    function renderCharts(rows) {
      const provinceItems = [...groupSum(rows, "province").values()]
        .sort((a, b) => b.visitors - a.visitors);
      const beachItems = [...rows]
        .sort((a, b) => b.visitors - a.visitors)
        .slice(0, 10)
        .map((row) => ({ label: row.beach, visitors: row.visitors }));
      renderBars("provinceChart", provinceItems, "");
      renderBars("topBeachChart", beachItems, "teal");
    }

    function fillProvinceFilter(rows) {
      const select = document.getElementById("provinceFilter");
      const provinces = [...new Set(rows.map((row) => row.province))].sort((a, b) => a.localeCompare(b, "ko"));
      select.insertAdjacentHTML("beforeend", provinces.map((province) => `<option value="${province}">${province}</option>`).join(""));
    }

    function getFilteredRows(rows) {
      const province = document.getElementById("provinceFilter").value;
      const query = document.getElementById("searchInput").value.trim();
      const minVisitors = Number(document.getElementById("minVisitors").value || 0);
      return rows.filter((row) => {
        return (!province || row.province === province)
          && (!query || row.beach.includes(query))
          && row.visitors >= minVisitors;
      });
    }

    function sortRows(rows) {
      const direction = state.sortDirection === "asc" ? 1 : -1;
      return [...rows].sort((a, b) => {
        if (state.sortKey === "visitors") {
          return (a.visitors - b.visitors) * direction;
        }
        return a[state.sortKey].localeCompare(b[state.sortKey], "ko") * direction;
      });
    }

    function renderTable(rows, allRows) {
      const cityTotals = groupSum(allRows, "city");
      const body = document.getElementById("tableBody");
      body.innerHTML = sortRows(rows).map((row) => {
        const cityTotal = cityTotals.get(row.city)?.visitors || 0;
        const badge = cityTotal >= 1000000 ? `<span class="badge">시군구 100만+</span>` : "";
        return `
          <tr>
            <td>${row.province}</td>
            <td>${row.city}${badge}</td>
            <td>${row.beach}</td>
            <td class="num">${numberFormat.format(row.visitors)}</td>
          </tr>
        `;
      }).join("");
      document.getElementById("rowCount").textContent = `표시 중: ${numberFormat.format(rows.length)}개소`;
    }

    function update(rows) {
      const filteredRows = getFilteredRows(rows);
      renderTable(filteredRows, rows);
    }

    const rows = parseCsv(document.getElementById("csv-data").textContent);
    renderSummary(rows);
    renderCharts(rows);
    fillProvinceFilter(rows);
    update(rows);

    document.getElementById("provinceFilter").addEventListener("change", () => update(rows));
    document.getElementById("searchInput").addEventListener("input", () => update(rows));
    document.getElementById("minVisitors").addEventListener("input", () => update(rows));
    document.querySelectorAll("th[data-key]").forEach((th) => {
      th.addEventListener("click", () => {
        const key = th.dataset.key;
        if (state.sortKey === key) {
          state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDirection = key === "visitors" ? "desc" : "asc";
        }
        update(rows);
      });
    });
  </script>
