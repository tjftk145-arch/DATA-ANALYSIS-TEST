<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>해양수산 정책 대시보드</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --ink: #152033;
      --muted: #65758b;
      --line: #dbe4ef;
      --panel: #ffffff;
      --blue: #2563eb;
      --teal: #0f9f8f;
      --orange: #e8791a;
      --red: #dc3b3b;
      --green: #16835f;
      --shadow: 0 18px 44px rgba(24, 43, 77, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(37, 99, 235, 0.09), rgba(244, 247, 251, 0) 260px),
        var(--bg);
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", Arial, sans-serif;
    }

    .dashboard {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .eyebrow,
    .panel-kicker {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.12;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .period {
      min-width: 220px;
      padding: 14px 16px;
      border: 1px solid rgba(37, 99, 235, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      text-align: right;
    }

    .period span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .period strong {
      display: block;
      margin-top: 5px;
      font-size: 15px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .kpi-card {
      position: relative;
      overflow: hidden;
      min-height: 142px;
      padding: 19px;
      border: 1px solid rgba(219, 228, 239, 0.9);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .kpi-card::after {
      position: absolute;
      right: -28px;
      bottom: -34px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      content: "";
      opacity: 0.13;
    }

    .kpi-card.catch::after { background: var(--teal); }
    .kpi-card.export::after { background: var(--blue); }
    .kpi-card.satisfaction::after { background: var(--green); }
    .kpi-card.incident::after { background: var(--red); }

    .kpi-label {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .kpi-card strong {
      display: block;
      margin-top: 19px;
      font-size: clamp(28px, 3.4vw, 40px);
      line-height: 1;
    }

    .kpi-card small {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 0.92fr 1.28fr;
      gap: 16px;
    }

    .panel {
      min-width: 0;
      padding: 20px;
      border: 1px solid rgba(219, 228, 239, 0.95);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .monthly-panel {
      grid-row: span 2;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .unit,
    .legend {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .legend {
      display: flex;
      gap: 12px;
      padding-top: 4px;
    }

    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 50%;
    }

    .dot.blue { background: var(--blue); }
    .dot.orange { background: var(--orange); }

    .bar-list {
      display: grid;
      gap: 15px;
    }

    .bar-item {
      display: grid;
      grid-template-columns: 84px 1fr 92px;
      align-items: center;
      gap: 12px;
    }

    .bar-name {
      overflow-wrap: anywhere;
      font-size: 14px;
      font-weight: 800;
    }

    .bar-track {
      overflow: hidden;
      height: 12px;
      border-radius: 999px;
      background: #edf2f8;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--blue));
    }

    .bar-value {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-align: right;
    }

    .chart-wrap {
      width: 100%;
      min-height: 330px;
    }

    .chart-wrap.compact {
      min-height: 240px;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: inherit;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .grid-line {
      stroke: #e9eef6;
      stroke-width: 1;
    }

    .insight-list {
      display: grid;
      gap: 13px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .insight-list li {
      padding: 14px 14px 14px 16px;
      border-left: 4px solid var(--blue);
      border-radius: 6px;
      background: #f8fbff;
      color: #344258;
      font-size: 14px;
      line-height: 1.55;
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .period {
        text-align: left;
      }

      .kpi-grid,
      .content-grid {
        grid-template-columns: 1fr 1fr;
      }

      .monthly-panel {
        grid-column: 1 / -1;
        grid-row: auto;
      }
    }

    @media (max-width: 620px) {
      .dashboard {
        width: min(100% - 22px, 1180px);
        padding-top: 24px;
      }

      .kpi-grid,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .bar-item {
        grid-template-columns: 76px 1fr;
      }

      .bar-value {
        grid-column: 2;
        text-align: left;
      }

      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <div>
        <p class="eyebrow">Ocean Fisheries Policy Monitor</p>
        <h1>해양수산 정책 대시보드</h1>
        <p class="subtitle">어획, 수출, 안전, 만족도 지표를 한 화면에서 비교합니다.</p>
      </div>
      <div class="period">
        <span>분석 기간</span>
        <strong id="periodText">-</strong>
      </div>
    </header>

    <section class="kpi-grid" aria-label="핵심 지표">
      <article class="kpi-card catch">
        <span class="kpi-label">총 어획량</span>
        <strong id="totalCatch">-</strong>
        <small>ton</small>
      </article>
      <article class="kpi-card export">
        <span class="kpi-label">총 수출액</span>
        <strong id="totalExport">-</strong>
        <small>USD</small>
      </article>
      <article class="kpi-card satisfaction">
        <span class="kpi-label">평균 만족도</span>
        <strong id="avgSatisfaction">-</strong>
        <small>/ 100</small>
      </article>
      <article class="kpi-card incident">
        <span class="kpi-label">총 안전사고 건수</span>
        <strong id="totalIncidents">-</strong>
        <small>건</small>
      </article>
    </section>

    <section class="content-grid">
      <article class="panel top-ports">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Landing Value</p>
            <h2>항만별 위판금액 TOP 5</h2>
          </div>
          <span class="unit">USD</span>
        </div>
        <div id="portBars" class="bar-list"></div>
      </article>

      <article class="panel monthly-panel">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Export Trend</p>
            <h2>월별 수출액 추이</h2>
          </div>
          <div class="legend">
            <span><i class="dot blue"></i>2024</span>
            <span><i class="dot orange"></i>2025</span>
          </div>
        </div>
        <div class="chart-wrap">
          <svg id="monthlyChart" role="img" aria-label="월별 수출액 추이 그래프"></svg>
        </div>
      </article>

      <article class="panel risk-panel">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Safety Risk</p>
            <h2>기상위험도별 사고 건수 비교</h2>
          </div>
          <span class="unit">건수</span>
        </div>
        <div class="chart-wrap compact">
          <svg id="riskChart" role="img" aria-label="기상위험도별 사고 건수 막대 그래프"></svg>
        </div>
      </article>

      <article class="panel insight-panel">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Policy Insight</p>
            <h2>정책 해석</h2>
          </div>
        </div>
        <ul id="insightList" class="insight-list"></ul>
      </article>
    </section>
  </main>

  <script>
    const dashboardData = {
      summary: {
        totalCatch: 912.36,
        totalExport: 1319524,
        avgSatisfaction: 75.6,
        totalIncidents: 141,
        recordCount: 300,
        dateStart: "2024-01-03",
        dateEnd: "2025-12-28"
      },
      topPorts: [
        { name: "앵커리지", value: 501792 },
        { name: "홋카이도", value: 390339 },
        { name: "시애틀", value: 382311 },
        { name: "보스턴", value: 380366 },
        { name: "샌디에이고", value: 322047 }
      ],
      monthlyExports: [
        { label: "2024-01", year: 2024, month: 1, value: 50952 },
        { label: "2024-02", year: 2024, month: 2, value: 43649 },
        { label: "2024-03", year: 2024, month: 3, value: 66201 },
        { label: "2024-04", year: 2024, month: 4, value: 49830 },
        { label: "2024-05", year: 2024, month: 5, value: 53460 },
        { label: "2024-06", year: 2024, month: 6, value: 50691 },
        { label: "2024-07", year: 2024, month: 7, value: 65898 },
        { label: "2024-08", year: 2024, month: 8, value: 73675 },
        { label: "2024-09", year: 2024, month: 9, value: 59014 },
        { label: "2024-10", year: 2024, month: 10, value: 50639 },
        { label: "2024-11", year: 2024, month: 11, value: 56582 },
        { label: "2024-12", year: 2024, month: 12, value: 43474 },
        { label: "2025-01", year: 2025, month: 1, value: 34910 },
        { label: "2025-02", year: 2025, month: 2, value: 47598 },
        { label: "2025-03", year: 2025, month: 3, value: 58793 },
        { label: "2025-04", year: 2025, month: 4, value: 60736 },
        { label: "2025-05", year: 2025, month: 5, value: 68591 },
        { label: "2025-06", year: 2025, month: 6, value: 75992 },
        { label: "2025-07", year: 2025, month: 7, value: 54657 },
        { label: "2025-08", year: 2025, month: 8, value: 57325 },
        { label: "2025-09", year: 2025, month: 9, value: 53006 },
        { label: "2025-10", year: 2025, month: 10, value: 60214 },
        { label: "2025-11", year: 2025, month: 11, value: 43860 },
        { label: "2025-12", year: 2025, month: 12, value: 39777 }
      ],
      riskIncidents: [
        { level: "Low", value: 38 },
        { level: "Medium", value: 79 },
        { level: "High", value: 24 }
      ]
    };

    const formatNumber = new Intl.NumberFormat("ko-KR");
    const formatUsd = new Intl.NumberFormat("ko-KR", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function renderKpis() {
      const { summary } = dashboardData;
      setText("periodText", `${summary.dateStart} ~ ${summary.dateEnd}`);
      setText("totalCatch", formatNumber.format(summary.totalCatch));
      setText("totalExport", formatUsd.format(summary.totalExport));
      setText("avgSatisfaction", summary.avgSatisfaction.toFixed(1));
      setText("totalIncidents", formatNumber.format(summary.totalIncidents));
    }

    function renderTopPorts() {
      const container = document.getElementById("portBars");
      const max = Math.max(...dashboardData.topPorts.map((item) => item.value));

      container.innerHTML = dashboardData.topPorts.map((item) => {
        const width = Math.round((item.value / max) * 100);
        return `
          <div class="bar-item">
            <span class="bar-name">${item.name}</span>
            <span class="bar-track" aria-hidden="true">
              <span class="bar-fill" style="width:${width}%"></span>
            </span>
            <span class="bar-value">${formatUsd.format(item.value)}</span>
          </div>
        `;
      }).join("");
    }

    function point(x, y) {
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }

    function renderMonthlyChart() {
      const svg = document.getElementById("monthlyChart");
      const width = 760;
      const height = 360;
      const pad = { left: 62, right: 24, top: 24, bottom: 48 };
      const plotWidth = width - pad.left - pad.right;
      const plotHeight = height - pad.top - pad.bottom;
      const maxValue = 80000;
      const monthGroups = [2024, 2025].map((year) =>
        dashboardData.monthlyExports.filter((item) => item.year === year)
      );
      const colors = { 2024: "#2563eb", 2025: "#e8791a" };

      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.innerHTML = "";

      for (let tick = 0; tick <= maxValue; tick += 20000) {
        const y = pad.top + plotHeight - (tick / maxValue) * plotHeight;
        svg.insertAdjacentHTML("beforeend", `
          <line class="grid-line" x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}"></line>
          <text class="axis-label" x="${pad.left - 10}" y="${y + 4}" text-anchor="end">${tick / 1000}k</text>
        `);
      }

      for (let month = 1; month <= 12; month += 1) {
        const x = pad.left + ((month - 1) / 11) * plotWidth;
        svg.insertAdjacentHTML("beforeend", `
          <text class="axis-label" x="${x}" y="${height - 18}" text-anchor="middle">${month}</text>
        `);
      }

      monthGroups.forEach((series) => {
        const pathPoints = series.map((item) => {
          const x = pad.left + ((item.month - 1) / 11) * plotWidth;
          const y = pad.top + plotHeight - (item.value / maxValue) * plotHeight;
          return { ...item, x, y };
        });
        const d = pathPoints.map((p) => point(p.x, p.y)).join(" ");
        const year = series[0].year;
        svg.insertAdjacentHTML("beforeend", `
          <polyline points="${d}" fill="none" stroke="${colors[year]}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
          ${pathPoints.map((p) => `
            <circle cx="${p.x}" cy="${p.y}" r="4.5" fill="${colors[year]}">
              <title>${p.label}: ${formatUsd.format(p.value)}</title>
            </circle>
          `).join("")}
        `);
      });
    }

    function renderRiskChart() {
      const svg = document.getElementById("riskChart");
      const width = 500;
      const height = 250;
      const pad = { left: 46, right: 20, top: 22, bottom: 44 };
      const plotWidth = width - pad.left - pad.right;
      const plotHeight = height - pad.top - pad.bottom;
      const maxValue = 90;
      const colors = { Low: "#16835f", Medium: "#e8791a", High: "#dc3b3b" };

      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.innerHTML = "";

      for (let tick = 0; tick <= maxValue; tick += 30) {
        const y = pad.top + plotHeight - (tick / maxValue) * plotHeight;
        svg.insertAdjacentHTML("beforeend", `
          <line class="grid-line" x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}"></line>
          <text class="axis-label" x="${pad.left - 10}" y="${y + 4}" text-anchor="end">${tick}</text>
        `);
      }

      const gap = 28;
      const barWidth = (plotWidth - gap * 2) / 3;
      dashboardData.riskIncidents.forEach((item, index) => {
        const x = pad.left + index * (barWidth + gap);
        const barHeight = (item.value / maxValue) * plotHeight;
        const y = pad.top + plotHeight - barHeight;
        svg.insertAdjacentHTML("beforeend", `
          <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="7" fill="${colors[item.level]}"></rect>
          <text class="axis-label" x="${x + barWidth / 2}" y="${y - 8}" text-anchor="middle">${item.value}</text>
          <text class="axis-label" x="${x + barWidth / 2}" y="${height - 16}" text-anchor="middle">${item.level}</text>
        `);
      });
    }

    function renderInsights() {
      const topPort = dashboardData.topPorts[0];
      const peakMonth = dashboardData.monthlyExports.reduce((best, item) =>
        item.value > best.value ? item : best
      );
      const highestRisk = dashboardData.riskIncidents.reduce((best, item) =>
        item.value > best.value ? item : best
      );

      const insights = [
        `${topPort.name}의 위판금액이 ${formatUsd.format(topPort.value)}로 가장 높아 물류·위판 인프라 우선 점검 대상입니다.`,
        `${peakMonth.label} 수출액이 ${formatUsd.format(peakMonth.value)}로 최대치를 기록해 해당 월의 수출 지원 정책 효과를 비교할 수 있습니다.`,
        `기상위험도 ${highestRisk.level} 구간에서 사고 ${highestRisk.value}건이 발생해 위험 단계별 안전점검 기준을 세분화할 필요가 있습니다.`
      ];

      document.getElementById("insightList").innerHTML = insights
        .map((text) => `<li>${text}</li>`)
        .join("");
    }

    renderKpis();
    renderTopPorts();
    renderMonthlyChart();
    renderRiskChart();
    renderInsights();
  </script>
</body>
</html>
