<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>어업 생산량 현황 대시보드</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">해양수산부 어업정책과</p>
      <h1>어업 생산량 현황 대시보드</h1>
    </div>
    <div class="period">데이터 기간 <strong>2001~2013년</strong></div>
  </header>

  <main>
    <section class="summary-grid" aria-label="요약 지표">
      <article class="metric">
        <span>총 생산량 누계</span>
        <strong id="metricTotal">-</strong>
        <small>천M/T</small>
      </article>
      <article class="metric highlight">
        <span>최고 생산 연도</span>
        <strong id="metricPeakYear">-</strong>
        <small id="metricPeakValue">-</small>
      </article>
      <article class="metric">
        <span>어류 누계</span>
        <strong id="metricFish">-</strong>
        <small>천M/T</small>
      </article>
      <article class="metric">
        <span>해조류 누계</span>
        <strong id="metricSeaweed">-</strong>
        <small>천M/T</small>
      </article>
    </section>

    <section class="toolbar" aria-label="검색 및 필터">
      <label>
        시작 연도
        <select id="startYear"></select>
      </label>
      <label>
        종료 연도
        <select id="endYear"></select>
      </label>
      <label>
        품종 선택
        <select id="categorySelect">
          <option value="all">전체</option>
          <option value="어류">어류</option>
          <option value="패류">패류</option>
          <option value="갑각류">갑각류</option>
          <option value="연체동물">연체동물</option>
          <option value="기타수산동물">기타수산동물</option>
          <option value="해조류">해조류</option>
        </select>
      </label>
    </section>

    <section class="dashboard-grid">
      <div class="panel wide">
        <div class="panel-head">
          <h2>연도별 총 생산량 추이</h2>
          <span>2008년 최고치 강조</span>
        </div>
        <canvas id="lineChart" aria-label="연도별 총 생산량 선 그래프"></canvas>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>품종별 생산량 합계</h2>
          <span>선택 기간 기준</span>
        </div>
        <canvas id="barChart" aria-label="품종별 생산량 합계 막대 차트"></canvas>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>어류 vs 해조류</h2>
          <span>연도별 비교</span>
        </div>
        <canvas id="compareChart" aria-label="어류와 해조류 비교 차트"></canvas>
      </div>
    </section>

    <section class="panel table-panel">
      <div class="panel-head">
        <h2>연도별 데이터 표</h2>
        <button id="sortButton" type="button">연도 내림차순</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>연도</th>
              <th>계</th>
              <th>어류</th>
              <th>패류</th>
              <th>갑각류</th>
              <th>연체동물</th>
              <th>기타수산동물</th>
              <th>해조류</th>
            </tr>
          </thead>
          <tbody id="dataBody"></tbody>
          <tfoot id="totalFoot"></tfoot>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
